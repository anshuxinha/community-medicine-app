name: Auto Update Health Guidelines

on:
  schedule:
    - cron: "30 4 * * *" # Runs daily at 10:00 AM IST (04:30 UTC)
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-auth

      - name: Run Fetch Script
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_KEY }}
        run: python scripts/fetch_updates.py

      - name: Run Library Verification Review
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLOUD_PROJECT: community-med-app
        run: python scripts/verify_mock_data.py

      - name: Commit and Push Changes
        id: commit_changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/updates.json src/data/updates_archive.json src/data/updates_images_map.js
          if [ -d "assets/updates" ]; then
            git add assets/updates/
          fi

          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "Auto-update national health guidelines and explainer images"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Expo Token
        id: expo_token_check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN not set; OTA publish will be skipped."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: ${{ steps.commit_changes.outputs.has_changes == 'true' && steps.expo_token_check.outputs.has_token == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install JS Dependencies
        if: ${{ steps.commit_changes.outputs.has_changes == 'true' && steps.expo_token_check.outputs.has_token == 'true' }}
        run: npm ci

      - name: Publish OTA Update
        if: ${{ steps.commit_changes.outputs.has_changes == 'true' && steps.expo_token_check.outputs.has_token == 'true' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_RC_API_KEY: ${{ secrets.EXPO_PUBLIC_RC_API_KEY }}
          EXPO_PUBLIC_RC_API_KEY_IOS: ${{ secrets.EXPO_PUBLIC_RC_API_KEY_IOS }}
          EXPO_PUBLIC_RC_API_KEY_ANDROID: ${{ secrets.EXPO_PUBLIC_RC_API_KEY_ANDROID }}
        run: npx eas-cli update --channel production --message "Daily dashboard guideline updates" --non-interactive

      - name: Send Notifications
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLOUD_PROJECT: community-med-app
        run: |
          python scripts/push_notifications.py \
            --title "New Health Updates" \
            --body "New national health guidelines and updates have been added. Tap to see what is new." \
            --screen "Updates"
