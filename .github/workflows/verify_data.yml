name: Verify Mock Data

on:
  schedule:
    # Runs at 10:00 UTC every Sunday
    - cron: "0 10 * * 0"
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  verify-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-auth google-auth-oauthlib telethon

      - name: Run Verification Script
        run: python scripts/verify_mock_data.py
        env:
          GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VERIFY_TARGET_ROOT_IDS: "7,8"

      - name: Commit and Push Changes
        id: commit_changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/mockData.json src/data/updates.json
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "chore(data): Weekly verification for IDs 7 and 8"
            git pull --rebase origin main
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Expo Token
        id: expo_token_check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN not set; OTA publish will be skipped."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: ${{ steps.commit_changes.outputs.has_changes == 'true' && steps.expo_token_check.outputs.has_token == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install JS Dependencies
        if: ${{ steps.commit_changes.outputs.has_changes == 'true' && steps.expo_token_check.outputs.has_token == 'true' }}
        run: npm ci

      - name: Publish OTA Update
        if: ${{ steps.commit_changes.outputs.has_changes == 'true' && steps.expo_token_check.outputs.has_token == 'true' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_RC_API_KEY: ${{ secrets.EXPO_PUBLIC_RC_API_KEY }}
        run: npx eas-cli update --channel production --message "Weekly verified updates for IDs 7 and 8" --non-interactive

      - name: Broadcast Push Notifications
        run: python scripts/push_notifications.py
        env:
          GOOGLE_CLOUD_PROJECT: community-med-app
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
